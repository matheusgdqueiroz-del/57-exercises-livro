<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="error-wrapper">
    <p id="error-message" role="alert"></p>
  </div>
  <div class="container">
    <div class="form">
      <label for="bill">What is the bill?</label>
      <div class="input-wrapper">
        <div class="dollar-wrapper">
          <span>$</span>
        </div>
        <input id="bill" type="number" placeholder="Enter bill amount">
      </div>

      <label for="tip-slider">What is the tip percentage?</label>
      <div class="slider-wrapper">
        <input id="tip-slider" type="range" min="5" max="20" value="15">
        <p>Tip: <span id="percentage-display">15</span>%</p>
      </div>
      <button type="button" id="reset-btn">Reset</button>
    </div>
    <div class="display">
      <h1>Tip Calculator</h1>

      <div class="row">
        <p>Tip Amount</p>
        <span id="display-tip"></span>
      </div>

      <div class="row">
        <p>Total</p>
        <span id="display-total"></span>

      </div>
    </div>
  </div>

</body>

</html>
