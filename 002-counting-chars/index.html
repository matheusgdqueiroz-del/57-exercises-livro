<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Number Of Characters</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="pencil-container">
            <img src="./img/pencil.svg" alt="">
        </div>
        <h1>Character Counter</h1>
        <p class="subtext">Type anything, and i'll count the characters!</p>
        <div class="input-container">
            <input type="text" placeholder="Type somethinig here...">
            <span class="counter">0</span>    
        </div>
        <button><i><i class="fa-solid fa-wand-magic-sparkles" style="color: rgb(255, 255, 255);"></i></i> Count Characters</button>
        <div class="bottom-text">
            <img src="./img/heart.svg" alt="icon of a purple heart">
            <p class="text">Make sure to type something so i can count!</p>
        </div>
        
    </div>
</body>
</html>
